    {{ getLanguageName(currentLanguage) }}

  </button>

  <!-- Language Dropdown Menu -->
  <div class="language-dropdown" *ngIf="isLanguageMenuOpen" role="menu">
    <button
      *ngFor="let lang of supportedLanguages"
      (click)="changeLanguage(lang)"
      [class.active]="currentLanguage === lang"
      class="language-option"
      role="menuitem"
      [attr.aria-selected]="currentLanguage === lang"
    >
      <span class="language-label">{{ getLanguageName(lang) }}</span>
    </button>
  </div>
</div>
