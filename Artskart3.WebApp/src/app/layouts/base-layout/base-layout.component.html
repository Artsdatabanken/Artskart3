
<div class="layout-wrapper">
  <app-header (menuToggle)="toggleFilterPanel()"></app-header>

  <div class="layout-container">
    <aside class="sidebar">
      <app-resizable-panel
        [initialWidth]="filterPanelWidth()"
        [minWidth]="280"
        [maxWidth]="500"
        [isDraggable]="true"
        (widthChanged)="onFilterPanelResize($event)"
      >
        <div class="sidebar-content">
          <div class="filter-section">
            <input
              id="search"
              type="text"
              [attr.placeholder]="'baseLayout.searchPlaceholder' | translate"
              class="filter-input"
            />
          </div>
        </div>
      </app-resizable-panel>
    </aside>

    <main class="main-content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
