apiVersion: 1

datasources:
  - name: InfluxDB
    type: influxdb
    uid: influxdb-local
    access: proxy
    url: http://influxdb:8086
    jsonData:
      version: Flux
      organization: artsdatabanken
      defaultBucket: benchmarks
      tlsSkipVerify: true
    secureJsonData:
      token: benchmark-local-token
    isDefault: true
    editable: true
